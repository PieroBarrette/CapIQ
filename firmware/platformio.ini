; ============================================================
; Capiq V0.1 — Firmware ESP32
; Guidage directionnel forestier (IMU MPU-9250 + LED SK6812 + BLE)
;
; Deux environnements :
;   - esp32dev          : DevKit ESP32-WROOM-32 classique (défaut)
;   - esp32-s3-devkitc-1: ESP32-S3 (cible future selon la BOM)
;
; Compiler :   pio run
; Téléverser : pio run -t upload
; Moniteur :   pio device monitor
; ============================================================

[platformio]
default_envs = esp32dev

[env]
platform = espressif32@^6.6.0
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
; Partition "huge_app" : 3 Mo pour l'application (BLE + ArduinoJson),
; au prix de l'OTA (non utilisé en V0.1).
board_build.partitions = huge_app.csv
build_flags =
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    ; SK6812 RGBW — Adafruit NeoPixel plutôt que FastLED :
    ; FastLED ne supporte PAS nativement le canal W des SK6812 RGBW.
    adafruit/Adafruit NeoPixel@^1.12.0
    ; MPU-9250 + AK8963 avec fusion Madgwick intégrée
    hideakitai/MPU9250@^0.4.8
    ; Pile BLE NimBLE : ~40 % plus légère et plus stable que Bluedroid
    h2zero/NimBLE-Arduino@^1.4.2
    ; Sérialisation/parsing JSON sûr
    bblanchon/ArduinoJson@^7.0.4

; ---------- Carte par défaut : DevKit ESP32-WROOM-32 ----------
[env:esp32dev]
board = esp32dev

; ---------- Cible future (BOM) : ESP32-S3 DevKitC-1 ----------
; Les broches sont adaptées automatiquement dans config.h.
[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
